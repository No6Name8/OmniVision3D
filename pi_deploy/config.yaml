yolo:
  model_path: vision/yolo_dji.onnx
  confidence_threshold: 0.50
  nms_threshold: 0.45
  input_size: 320

identity_confirmation:
  model_path: vision/omnivision3d.onnx
  confidence_threshold: 0.85
  consecutive_required: 3
  reset_threshold: 0.50
  crop_padding: 0.20

tracking:
  lost_searching_seconds: 3.0
  lost_navigating_seconds: 10.0
  pid_p: 0.1
  pid_i: 0.01
  pid_d: 0.05

navigation:
  home_lat: 24.7136
  home_lon: 46.6753
  altitude: 50
  close_enough_meters: 50

camera:
  index: 0
  width: 640
  height: 480

drone_classifier:
  generic_threshold: 0.50
  consecutive_required: 3
  lost_timeout_seconds: 2.0
  enemy_id_every_n_frames: 5
  enemies_file: enemies/enemies.yaml

motor_control:
  cruise_power_us: 1500
  base_power_us: 1500
  intercept_power_us: 1900
  min_power_us: 1000
  max_power_us: 2000
  max_correction_pct: 20
  max_pixel_offset: 320
  simulation_mode: true
  pid:
    Kp: 0.06
    Ki: 0.001
    Kd: 0.01

motor_mapping:
  front_left:  channel_1
  front_right: channel_2
  rear_left:   channel_3
  rear_right:  channel_4
  flip_yaw:    false
  flip_pitch:  false
  calibrated:  false

launch_listener:
  enabled: true
  port: 5556
  wait_for_launch: false   # set true to hold in STANDBY until laptop sends LAUNCH

simulation_mode: true
