# OmniVision3D default experiment configuration

rendering:
  # Fibonacci sphere sampling: 100 points evenly distributed across the full
  # sphere — front, rear, left, right, top-down, bottom-up, every diagonal.
  # No clustering at poles. Each angle gets all 6 distances below.
  # Total: 100 angles x 6 distances = 600 renders.
  sphere_angles: 100

  # Six distances per angle: close through extreme long-range.
  # Mesh is scaled per distance so apparent size changes realistically.
  distances:
    - 2.0    # close
    - 3.5    # medium
    - 5.5    # mid-range
    - 8.0    # long
    - 12.0   # very far
    - 18.0   # extreme far

  # Point-light positions [x, y, z] sampled across render batches.
  # Varying lighting improves robustness to real-world illumination conditions.
  lighting_variations:
    - [ 0.0,  1.0, -1.0]   # above-front
    - [ 1.0,  0.0, -1.0]   # side-front right
    - [-1.0,  0.0, -1.0]   # side-front left
    - [ 0.0, -1.0, -1.0]   # below-front
    - [ 0.0,  0.0, -2.0]   # directly behind camera

  # Render resolution in pixels (square).
  image_size: 512

  # Root directory where raw/ and processed/ sub-folders are written.
  output_path: dataset

  # Mesh formats accepted by the loader.
  supported_formats:
    - .obj
    - .glb
    - .stl
    - .fbx
    - .step
    - .stp

training:
  epochs: 30
  batch_size: 32
  learning_rate: 0.001
  # Directory where best.pt checkpoint is saved.
  checkpoint_dir: checkpoints

# Thermal imaging settings.
thermal: false
thermal_palettes:
  - iron
  - rainbow
  - grayscale
thermal_dataset: dataset/processed/DJI_Mini_4_Pro_thermal

# Class names populated at training time from processed/ sub-folder names.
# Override manually when running the API server standalone.
classes: [no_drone, dji_mini_4_pro]
